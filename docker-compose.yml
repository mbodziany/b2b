services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: b2b
      POSTGRES_PASSWORD: b2b
      POSTGRES_DB: b2b
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U b2b"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Overrides any DATABASE_URL/STORAGE_ROOT from .env.example so the
      # containerized app talks to the "db" service and the named volume,
      # regardless of what a local (non-Docker) dev setup uses in .env.
      DATABASE_URL: postgresql://b2b:b2b@db:5432/b2b?schema=public
      STORAGE_ROOT: /var/lib/b2b-portal/storage
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - storage-data:/var/lib/b2b-portal/storage

volumes:
  db-data:
  storage-data:
